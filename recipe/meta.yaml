{% set name = "treepoem" %}
{% set version = "3.12.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/treepoem-{{ version }}.tar.gz
  sha256: 4cad77106796e4bef287acd018faf9b0247dea403c2c51ab902b511b8ed4c9c8

build:
  number: 1
  noarch: python
  entry_points:
    - treepoem=treepoem.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - pillow
    - ghostscript

test:
  imports:
    - treepoem
  commands:
    - pip check
    - treepoem --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/adamchainz/treepoem
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Barcode rendering for Python supporting QRcode, Aztec, PDF417, I25, Code128, Code39 and many more types.
  doc_url: https://github.com/adamchainz/treepoem
  dev_url: https://github.com/adamchainz/treepoem

extra:
  recipe-maintainers:
    - Ryan-Dmello
